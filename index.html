<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <h1> Simon Says Game </h1>
    <h2> Press any key to start </h2>
    <div id="info" style="margin-bottom:1rem;font-size:1.2rem;"></div>
    <button id="resetBtn" style="display:none;margin:1rem;padding:1rem 2rem;font-size:1.2rem;">Reset Game</button>
    <div class="btn-container">
        <div class="line-one">

            <div class="btn red" type="button" id="red">1</div>
            <div class="btn green" type="button"  id="green">2</div>

            </div>
        
    
    <div class="line-two">

        <div class="btn yellow" type="button" id="yellow">3</div>
        <div class="btn purple" type="button" id="purple">4</div>
    </div>
</div>
    <script src="script.js"></script>


</body>
</html>
